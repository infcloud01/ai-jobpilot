name: Build and Push AI-JobPilot Backend to AWS ECR

on:
  push:
    branches: [ "main" ]  # Triggers the build automatically whenever you merge to main

permissions:
  id-token: write         # Crucial permission required to request the OIDC JWT token
  contents: read          # Allows the runner to checkout your source code

jobs:
  ci-cd-pipeline:
    name: Lint, Test, and Containerize
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout codebase
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Setup Python environment for light code-quality check
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Syntax and Code Quality Checks
      run: |
        # Fails the build early if there are critical Python compilation or syntax flaws
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 3. Authenticate with AWS via OIDC Role Assumption (Zero permanent keys)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        role-to-assume: arn:aws:iam::271093731148:role/github-actions-ecr-role  # <-- Replace with your Role ARN
        aws-region: us-west-1                                                  # <-- Replace with your AWS Region

    # 4. Log in into the private AWS Elastic Container Registry
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 5. Build the multi-stage production Docker image and tag it
    - name: Build, Tag, and Push Docker Image
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ai-jobpilot-backend
        IMAGE_TAG: ${{ github.sha }}  # Tags image with the unique git commit ID for easy tracking/rollbacks
      run: |
        # Build from the backend directory context
        docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest ./backend
        
        # Ship both tags straight up to your secure private ECR registry
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        docker push $REGISTRY/$REPOSITORY:latest